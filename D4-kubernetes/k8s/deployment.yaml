apiVersion: apps/v1
kind: Deployment
metadata:
  name: convert-service
  namespace: convert-service
  labels:
    app.kubernetes.io/name: convert-service
    app.kubernetes.io/part-of: pm4-6558-d4
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: convert-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: convert-service
    spec:
      containers:
        - name: convert-service
          image: i4-convert-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: convert-service-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
