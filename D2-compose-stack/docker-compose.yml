name: d2-fraud-stack

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "5433:5432"

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql://fraud:fraud@db:5432/fraud
    ports:
      - "8100:8100"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      FRAUD_API_URL: http://api:8100
      FRAUD_ENGINE_PATH: /usr/local/bin/fraud-score
      WORKER_POLL_MS: "2000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
