name: Convert Service CI

on:
  push:
    branches: [main, master, "assignment/**"]
    paths:
      - "PM4-6558-assignment/I4-convert-pair/**"
      - "PM4-6558-assignment/D3-ci/**"
      - ".github/workflows/convert-service-ci.yml"
  pull_request:
    paths:
      - "PM4-6558-assignment/I4-convert-pair/**"
      - "PM4-6558-assignment/D3-ci/**"
      - ".github/workflows/convert-service-ci.yml"

concurrency:
  group: convert-service-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: PM4-6558-assignment/I4-convert-pair/service
  CLIENT_DIR: PM4-6558-assignment/I4-convert-pair/client
  IMAGE_NAME: i4-convert-service

jobs:
  lint-and-test:
    name: lint + test (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ env.SERVICE_DIR }}/requirements-dev.txt
            ${{ env.SERVICE_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Pytest
        run: pytest -q --tb=short

  client-test:
    name: node client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.CLIENT_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Install and test
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm test

  docker-build:
    name: build container image
    runs-on: ubuntu-latest
    needs: [lint-and-test, client-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker image inspect ${{ env.IMAGE_NAME }}:latest
          docker run --rm -d --name ci-smoke -p 8000:8000 ${{ env.IMAGE_NAME }}:latest
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health; then
              echo "Container health OK"
              docker stop ci-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs ci-smoke || true
          docker stop ci-smoke || true
          exit 1
